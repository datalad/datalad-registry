# This file is for overriding docker-compose.dev.yml for local development.
# Particularly, it enables debug mode for the web service and mounts
# the current directory at the host to the `/app` directory in the container.

services:
  web:
    command: [
      "/sbin/my_init", "--",
      "bash", "-c",
      "git config --global --add safe.directory /app && pip3 install -U -e . && pip install -e /metalad && pip install -e /catalog && flask init-db && exec flask run --host=0.0.0.0 --debug"
    ]
    volumes:
      - ./:/app
      - ../datalad-catalog:/catalog
      - ../datalad-metalad:/metalad
      - ./instance:/app/instance
